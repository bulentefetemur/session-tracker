<!DOCTYPE html>
<html lang="tr">

<head>
    <link rel="manifest" href="./manifest.json">
    <link rel="apple-touch-icon" href="./session_tracker.png">
    <meta charset="UTF-8">
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">

    <!-- PWA Meta Etiketleri -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#000000">
    <meta name="apple-mobile-web-app-title" content="Tracker">

<!-- OneSignal SDK Entegrasyonu -->
<script src="https://cdn.onesignal.com/sdks/web/v16/OneSignalSDK.page.js"></script>
<script>
  window.OneSignalDeferred = window.OneSignalDeferred || [];
  OneSignalDeferred.push(async function(OneSignal) {
    await OneSignal.init({
      appId: "0955cb95-118c-43f0-a716-c7c476bf9c9e",
      serviceWorkerPath: 'OneSignalSDKWorker.js',
      serviceWorkerParam: { scope: '/' },
      allowLocalhostAsSecureOrigin: true
    });
    
    // ID geldiğinde debug-status'u güncellemek için global bir listener
    OneSignal.User.PushSubscription.addEventListener("change", (event) => {
      const id = event.current.id;
      const statusEl = document.getElementById('debug-status');
      if (statusEl) {
        statusEl.innerText = id ? "Status: Registered! ID: " + id.substring(0,8) : "Status: Ready";
        statusEl.style.color = id ? "#4CAF50" : "#EBEBF599";
      }
    });
  });
</script>

<title>Session Tracker</title>
<style>
    /* Temel Değişkenler ve Sıfırlama */
    :root {
        --bg-color: #000000;
        --text-primary: #FFFFFF;
        --text-secondary: #EBEBF599;
        --glass-bg: rgba(44, 44, 46, 0.7);
        --glass-border: rgba(255, 255, 255, 0.1);
        --dynamic-color: #FF3B30;
    }

    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        -webkit-tap-highlight-color: transparent;
    }

    body {
        background-color: var(--bg-color);
        color: var(--text-primary);
        overflow: hidden;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
    position: fixed;
    width: 100%;
    overflow: hidden;
    overscroll-behavior: none;
    -webkit-user-drag: none;
    }

    #app {
        width: 100%;
        max-width: 430px;
        height: 100%;
        position: relative;
        display: flex;
        flex-direction: column;
    }

    /* Ekran Geçişleri */
    .screen {
        position: absolute;
        inset: 0;
        display: flex;
        flex-direction: column;
        padding: env(safe-area-inset-top) 24px env(safe-area-inset-bottom) 24px;
        opacity: 0;
        pointer-events: none;
        transition: opacity 0.4s cubic-bezier(0.25, 0.8, 0.25, 1);
    }

    .screen.active {
        opacity: 1;
        pointer-events: all;
        z-index: 10;
    }

    .screen.hidden {
        z-index: 1;
    }

    /* KURULUM EKRANI (Setup) */
    #setup-screen {
        justify-content: center;
        align-items: center;
        gap: 40px;
    }

    .header {
        text-align: center;
    }

    .header h1 {
        font-size: 34px;
        font-weight: 700;
        letter-spacing: 0.37px;
    }

    .subtitle {
        color: var(--text-secondary);
        font-size: 17px;
        margin-top: 8px;
    }

    .time-picker-container {
        position: relative;
        display: flex;
        align-items: center;
        gap: 16px;
        background: #1C1C1E;
        padding: 16px 20px;
        border-radius: 24px;
        -webkit-mask-image: linear-gradient(to bottom, transparent 5%, black 40%, black 60%, transparent 95%);
        mask-image: linear-gradient(to bottom, transparent 5%, black 40%, black 60%, transparent 95%);
    }

    .picker-group {
        display: flex;
        align-items: center;
        gap: 8px;
        z-index: 2;
    }

    .picker-column {
        height: 150px;
        width: 60px;
        overflow-y: scroll;
        scroll-snap-type: y mandatory;
        scrollbar-width: none;
        -ms-overflow-style: none;
    }

    .picker-column::-webkit-scrollbar {
        display: none;
    }

    .picker-column::before,
    .picker-column::after {
        content: '';
        display: block;
        height: 50px;
    }

    .picker-item {
        height: 50px;
        display: flex;
        align-items: center;
        justify-content: center;
        color: var(--text-primary);
        font-size: 42px;
        font-weight: 600;
        scroll-snap-align: center;
        font-variant-numeric: tabular-nums;
    }

    .picker-group label {
        color: var(--text-secondary);
        font-size: 15px;
        font-weight: 500;
    }

    .picker-highlight {
        position: absolute;
        top: 50%;
        left: 16px;
        right: 16px;
        height: 50px;
        transform: translateY(-50%);
        background: rgba(255, 255, 255, 0.05);
        border-radius: 12px;
        pointer-events: none;
        z-index: 1;
    }

    .picker-separator {
        font-size: 48px;
        font-weight: 600;
        color: var(--text-secondary);
        z-index: 2;
    }

    /* BUTONLAR (Capsule Form) */
    .capsule {
        border-radius: 9999px;
        border: none;
        font-size: 17px;
        font-weight: 600;
        padding: 18px 32px;
        width: 100%;
        cursor: pointer;
        transition: transform 0.2s ease, opacity 0.2s ease, background-color 0.3s ease;
    }

    .capsule:active {
        transform: scale(0.96);
        opacity: 0.8;
    }

    .btn-primary {
        background-color: #FF9500;
        /* Altın rengi / Orange-dark detay */
        color: #FFF;
    }

    .btn-toggle {
        background-color: var(--dynamic-color);
        color: #000;
    }

    .controls {
        display: flex;
        flex-direction: column;
        gap: 16px;
        width: 100%;
        margin-bottom: 140px;
    }

    .btn-secondary {
        background-color: #2C2C2E;
        color: #FFFFFF;
    }

    /* AKTİF EKRAN (Timer & Stats) */
    #active-screen {
        justify-content: space-between;
    }

    .active-header {
        text-align: center;
        padding-top: 20px;
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 12px;
    }

    .target-label {
        background: #1C1C1E;
        padding: 8px 16px;
        border-radius: 20px;
        font-size: 15px;
        font-weight: 500;
        color: var(--text-secondary);
    }

    .center-focus {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 16px;
        flex-grow: 1;
        justify-content: center;
    }

    .progress-pill {
        background: var(--dynamic-color);
        color: #000;
        padding: 6px 16px;
        border-radius: 16px;
        font-weight: 700;
        font-size: 17px;
        transition: background-color 0.3s ease;
    }

    .massive-timer {
        font-size: 80px;
        font-weight: 200;
        letter-spacing: -2px;
        font-variant-numeric: tabular-nums;
    }

    .state-text {
        font-size: 20px;
        font-weight: 500;
        color: var(--dynamic-color);
        transition: color 0.3s ease;
    }

    /* ALT KALICI İSTATİSTİKLER */
    .glass-footer {
        position: absolute;
        bottom: env(safe-area-inset-bottom, 20px);
        left: 20px;
        right: 20px;
        background: var(--glass-bg);
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
        border: 1px solid var(--glass-border);
        border-radius: 24px;
        padding: 20px;
        display: flex;
        justify-content: space-around;
        align-items: center;
    }

    .stat-box {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 4px;
        width: 45%;
    }

    .stat-title {
        font-size: 13px;
        color: var(--text-secondary);
        text-transform: uppercase;
        letter-spacing: 0.5px;
        font-weight: 600;
    }

    .stat-value {
        font-size: 22px;
        font-weight: 600;
        font-variant-numeric: tabular-nums;
    }

    .stat-divider {
        width: 1px;
        height: 40px;
        background: var(--glass-border);
    }

    /* TOAST MESSAGE (Glassmorphism) */
    .toast-message {
        position: fixed;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -30%);
        background: rgba(30, 30, 30, 0.8);
        backdrop-filter: blur(16px);
        -webkit-backdrop-filter: blur(16px);
        border: 1px solid rgba(255, 255, 255, 0.1);
        color: #FFF;
        padding: 16px 24px;
        border-radius: 16px;
        font-size: 16px;
        font-weight: 600;
        opacity: 0;
        pointer-events: none;
        transition: opacity 0.4s cubic-bezier(0.25, 0.8, 0.25, 1), transform 0.4s cubic-bezier(0.25, 0.8, 0.25, 1);
        z-index: 10000;
        box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
        text-align: center;
    }
    .toast-message.show {
        opacity: 1;
        transform: translate(-50%, -50%);
    }
</style>
</head>

<body>
    <div id="https-warning"
        style="display:none; background:#FF3B30; color:white; padding:16px; text-align:center; font-weight:600; position:absolute; top:0; left:0; width:100%; z-index:9999; padding-top: env(safe-area-inset-top);">
        HATA: Bildirimler için HTTPS gereklidir!
    </div>

    <!-- Sessiz Modu Delen Audio Hack -->
    <audio id="silent-unlock" loop
        src="data:audio/wav;base64,UklGRigAAABXQVZFZm10IBIAAAABAAEARKwAAIhYAQACABAAAABkYXRhAgAAAAEA"></audio>

    <div id="debug-status" style="position:absolute; top:40px; left:0; width:100%; text-align:center; font-size:12px; z-index:9999; color:#EBEBF599; pointer-events:none;">Status: Ready</div>
    <div id="toast-container" class="toast-message">Bildirimler Aktif!</div>

    <div id="app" class="theme-dark">
        <!-- KURULUM EKRANI (Idle State) -->
        <section id="setup-screen" class="screen active">
            <div class="header">
                <h1>Hedef Belirle</h1>
                <p class="subtitle">Çalışma süreni planla</p>
            </div>

            <div class="time-picker-container">
                <div class="picker-highlight"></div>
                <div class="picker-group">
                    <div class="picker-column" id="picker-hours"></div>
                    <label>Saat</label>
                </div>
                <div class="picker-separator">:</div>
                <div class="picker-group">
                    <div class="picker-column" id="picker-minutes"></div>
                    <label>Dk</label>
                </div>
                <div class="picker-separator">:</div>
                <div class="picker-group">
                    <div class="picker-column" id="picker-seconds"></div>
                    <label>Sn</label>
                </div>
            </div>

            <button id="btn-start-session" class="btn-primary capsule">Oturumu Başlat</button>
        </section>

        <!-- AKTİF OTURUM EKRANI (Working / Resting State) -->
        <section id="active-screen" class="screen hidden">
            <div class="active-header">
                <span class="target-label">Hedef: <span id="lbl-target-time">00:00</span></span>
            </div>

            <div class="center-focus">
                <div id="progress-indicator" class="progress-pill">
                    <span id="lbl-percentage">%0</span>
                </div>
                <h2 id="lbl-current-timer" class="massive-timer">00:00</h2>
                <p id="lbl-current-state" class="state-text">Çalışıyor</p>
            </div>

            <div class="controls">
                <button id="btn-toggle-state" class="btn-toggle capsule">Mola Ver</button>
                <button id="btn-end-session" class="btn-secondary capsule">Çalışmayı Sonlandır</button>
            </div>

            <footer class="glass-footer">
                <div class="stat-box">
                    <span class="stat-title">Toplam Çalışma</span>
                    <span id="stat-work-time" class="stat-value">00:00</span>
                </div>
                <div class="stat-divider"></div>
                <div class="stat-box">
                    <span class="stat-title">Toplam Mola</span>
                    <span id="stat-rest-time" class="stat-value">00:00</span>
                </div>
            </footer>
        </section>
    </div>
    <script src="app.js"></script>
</body>

</html>
</body>

</html>
