<!DOCTYPE html>
<html lang="tr">

<head>
    <link rel="manifest" href="./manifest.json">
    <link rel="apple-touch-icon" href="./session_tracker.png">
    <meta charset="UTF-8">
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#000000">
    <title>Session Tracker v13</title>
    <script src="https://cdn.onesignal.com/sdks/web/v16/OneSignalSDK.page.js" defer></script>
    <script>
        window.OneSignalDeferred = window.OneSignalDeferred || [];
        OneSignalDeferred.push(async function (OneSignal) {
            await OneSignal.init({
                appId: "0955cb95-118c-43f0-a716-c7c476bf9c9e",
                serviceWorkerPath: 'OneSignalSDKWorker.js',
                serviceWorkerParam: { scope: '/' },
                allowLocalhostAsSecureOrigin: true
            });
            
            OneSignal.Notifications.addEventListener("foregroundWillDisplay", (event) => {
                event.preventDefault();
                event.notification.display();
            });
        });
    </script>
    <style>
        :root {
            --bg-color: #000000;
            --text-primary: #FFFFFF;
            --text-secondary: #EBEBF599;
            --glass-bg: rgba(44, 44, 46, 0.7);
            --glass-border: rgba(255, 255, 255, 0.1);
            --dynamic-color: #FF9500;
            /* Amber Focus Color */
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, system-ui, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: var(--bg-color);
            color: var(--text-primary);
            overflow: hidden;
            height: 100vh;
            position: fixed;
            width: 100%;
        }

        /* LOGIN & APP WRAPPER */
        #login-screen {
            position: fixed;
            inset: 0;
            background: #000;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 3000;
            padding: 40px;
        }

        #login-screen.hidden {
            display: none;
        }

        #app {
            width: 100%;
            height: 100%;
            display: none;
            flex-direction: column;
        }

        #app.active {
            display: flex;
        }

        /* PICKER */
        .time-picker-container {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            background: #1C1C1E;
            border-radius: 24px;
            padding: 20px 0;
            margin: 30px auto;
            width: 100%;
            max-width: 340px;
            height: 200px;
            overflow: hidden;
            position: relative;
            -webkit-mask-image: linear-gradient(to bottom, transparent, black 40%, black 60%, transparent);
            mask-image: linear-gradient(to bottom, transparent, black 40%, black 60%, transparent);
        }

        .picker-column {
            height: 150px;
            width: 60px;
            overflow-y: scroll;
            scroll-snap-type: y mandatory;
            scrollbar-width: none;
        }

        .picker-column::-webkit-scrollbar {
            display: none;
        }

        .picker-item {
            height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            font-weight: 600;
            scroll-snap-align: center;
        }

        .picker-column::before,
        .picker-column::after {
            content: '';
            display: block;
            height: 50px;
        }

        .picker-label {
            font-size: 12px;
            color: var(--text-secondary);
            margin-left: 2px;
        }

        /* UI ELEMENTS */
        .tab-content {
            position: absolute;
            inset: 0;
            bottom: 90px;
            padding: calc(env(safe-area-inset-top) + 40px) 20px 100px;
            display: none;
            flex-direction: column;
            overflow-y: auto;
        }

        .tab-content.active {
            display: flex;
        }

        .bottom-nav {
            position: fixed;
            bottom: 0;
            width: 100%;
            height: 90px; /* Retained for ample touch area */
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            border-top: 1px solid var(--glass-border);
            display: flex;
            justify-content: space-around;
            align-items: center;
            padding-bottom: env(safe-area-inset-bottom, 15px) !important; /* Reduced for closer alignment */
            z-index: 2000;
        }

        .nav-item {
            color: var(--text-secondary);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-size: 11px;
            cursor: pointer;
            transition: 0.3s;
            height: 100%; /* Allow flex to center content vertically */
        }

        .nav-item svg {
            margin-bottom: 0; /* Explicitly set */
        }

        .nav-item span {
            font-size: 10px;
            margin-top: 2px; /* Added space between icon and text */
        }

        .nav-item.active {
            color: var(--dynamic-color);
        }

        .capsule {
            border-radius: 99px;
            border: none;
            padding: 18px;
            font-size: 17px;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
        }

        .btn-primary {
            background: var(--dynamic-color);
            color: #000;
        }

        .btn-secondary {
            background: #2C2C2E;
            color: #fff;
            margin-top: 12px;
        }

        .massive-timer {
            font-size: 72px;
            font-weight: 200;
            text-align: center;
            margin: 30px 0;
            font-variant-numeric: tabular-nums;
            letter-spacing: -2px; /* Added for better fit with centiseconds */
        }

        .progress-pill {
            padding: 6px 16px;
            border-radius: 99px;
            font-weight: 700;
            width: fit-content;
            margin: 0 auto;
        }

        .progress-low {
            background: #FF3B30;
        }

        .progress-mid {
            background: #FFCC00;
            color: #000;
        }

        .progress-high {
            background: #34C759;
        }

        /* ANALYTICS */
        .toggle-group {
            display: flex;
            background: #1C1C1E;
            padding: 4px;
            border-radius: 99px;
            margin-bottom: 24px;
        }

        .toggle-btn {
            flex: 1;
            padding: 10px;
            border-radius: 99px;
            border: none;
            background: transparent;
            color: #fff;
            cursor: pointer;
            font-weight: 600;
        }
        
        .toggle-btn.active {
            background: var(--dynamic-color);
            color: #000;
        }

        /* HAFTALIK GRAFİK SÜTUNLARI */
        .stacked-bar-container {
            width: 100%;
            display: flex;
            flex-direction: column-reverse; /* Barları alttan üste dizer */
            border-radius: 4px;
            overflow: hidden;
            min-height: 10px; /* Görünürlük için min-yükseklik */
            background: #2c2c2e; /* Boş veri için arka plan */
            transition: transform 0.2s ease;
            border: 1px solid rgba(255,255,255,0.05);
            height: 150px; /* Sabit yükseklik */
        }

        .chart-col:active .stacked-bar-container {
            transform: scale(1.05);
        }

        /* CALENDAR */
        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 8px;
            margin-top: 15px;
        }

        .cal-day {
            aspect-ratio: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #1C1C1E;
            border-radius: 50%;
            font-size: 14px;
            position: relative;
        }

        .cal-day.active {
            border: 2px solid var(--dynamic-color);
            background: rgba(255, 149, 0, 0.1);
        }

        .cal-day.today {
            border: 2px solid var(--dynamic-color);
            color: var(--dynamic-color);
            font-weight: 700;
        }

        .cal-dot {
            position: absolute;
            bottom: 4px;
            width: 4px;
            height: 4px;
            background: var(--dynamic-color);
            border-radius: 50%;
        }

        #loading-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.9);
            z-index: 5000;
            display: none;
            justify-content: center;
            align-items: center;
            flex-direction: column;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 5px solid rgba(255, 149, 0, 0.1);
            border-top: 5px solid var(--dynamic-color);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            100% {
                transform: rotate(360deg);
            }
        }
    </style>
</head>

<body>
    <div id="loading-overlay">
        <div class="spinner"></div>
        <p style="color:#fff; margin-top:15px;">Yükleniyor...</p>
    </div>

    <section id="login-screen">
        <h1 style="margin-bottom:8px;">Hoş Geldin</h1>
        <p style="color:var(--text-secondary); margin-bottom:32px;">Sana nasıl hitap edelim?</p>
        <input type="text" id="username-input"
            style="width:100%; background:var(--glass-bg); border:1px solid var(--glass-border); color:#fff; padding:18px; border-radius:16px; font-size:17px; text-align:center; outline:none;"
            placeholder="Adınız...">
        <button id="btn-login-action" class="capsule btn-primary" style="margin-top:24px;">Hemen Başla</button>
    </section>

    <div id="app">
        <div id="main-content" style="flex:1; position:relative;">

            <div id="profile-tab" class="tab-content">
                <h1 id="profile-display-name">Profil</h1>
                <div style="background:#1C1C1E; padding:20px; border-radius:20px; margin-top:20px;">
                    <div style="display:flex; justify-content:space-between; align-items:center;">
                        <button class="toggle-btn" id="cal-prev" style="flex:0; padding:5px 15px;">&lt;</button>
                        <h3 id="cal-month-year">Nisan 2026</h3>
                        <button class="toggle-btn" id="cal-next" style="flex:0; padding:5px 15px;">&gt;</button>
                    </div>
                    <div class="calendar-grid" id="calendar-grid"></div>
                </div>
                <div id="profile-kpi-box" style="margin-top:20px;">
                    <h4 style="color:var(--text-secondary); font-size:14px; margin-bottom:12px;">Oturum Geçmişi</h4>
                    <div id="profile-history-list" style="display:flex; flex-direction:column; gap:10px; max-height: 30vh; overflow-y:auto;"></div>
                </div>
            </div>

            <div id="timer-tab" class="tab-content active">
                <div id="setup-screen">
                    <h1 style="text-align:center;">Hedef Belirle</h1>
                    <div class="time-picker-container">
                        <div class="picker-column" id="picker-hours"></div><span class="picker-label">S</span>
                        <div class="picker-column" id="picker-minutes"></div><span class="picker-label">D</span>
                        <div class="picker-column" id="picker-seconds"></div><span class="picker-label">Sn</span>
                    </div>
                    <button id="btn-start-session" class="capsule btn-primary">Oturumu Başlat</button>
                </div>
                <div id="active-screen" style="display:none;">
                    <div style="text-align:center; color:var(--text-secondary); font-size:14px;">Hedef: <span
                            id="lbl-target-time">00:00:00</span></div>
                    <div id="lbl-percentage" class="progress-pill progress-low" style="margin-top:20px;">%0</div>
                    <h2 id="lbl-current-timer" class="massive-timer">00:00:00</h2>
                    <p id="lbl-current-state" style="text-align:center; color:var(--dynamic-color); font-weight:600;">
                        Çalışıyor</p>
                    <div style="margin-top:30px;">
                        <button id="btn-toggle-state" class="capsule btn-primary">Mola Ver</button>
                        <button id="btn-end-session" class="capsule btn-secondary">Çalışmayı Sonlandır</button>
                    </div>
                    <div id="segment-container"
                        style="margin-top:30px; background:#1C1C1E; border-radius:20px; padding:15px;">
                        <div id="segment-summary"
                            style="text-align:center; font-size:12px; color:var(--text-secondary); margin-bottom:15px;">
                            Yükleniyor...</div>
                        <div id="segment-list" style="display:flex; flex-direction:column; gap:10px;"></div>
                    </div>
                </div>
            </div>

            <div id="analytics-tab" class="tab-content">
                <h1>Analiz</h1>
                <div class="toggle-group" style="margin-top:20px;">
                    <button class="toggle-btn active" id="btn-daily-view">Günlük</button>
                    <button class="toggle-btn" id="btn-weekly-view">Haftalık</button>
                </div>
            <div style="text-align:center; margin-bottom:20px;">
                <input type="date" id="analytics-date-picker" style="background:#2C2C2E; color:#fff; border:none; padding:12px 20px; border-radius:12px; outline:none; font-family:inherit; font-size:15px; width:100%; max-width:250px; text-align:center;">
            </div>
                <div id="analytics-container" style="background:#1C1C1E; padding:20px; border-radius:20px;">
                    <h4 id="chart-title">Verimlilik</h4>
                    <div id="analytics-chart"
                        style="min-height:200px; display:flex; align-items:center; justify-content:center;"></div>
                </div>
                <div id="analytics-session-box" style="margin-top:20px; display:none;">
                    <h4 style="color:var(--text-secondary); font-size:14px; margin-bottom:12px;">Günlük Oturumlar</h4>
                    <div id="analytics-session-list" style="display:flex; flex-direction:column; gap:10px;"></div>
                </div>
            </div>
        </div>

        <nav class="bottom-nav">
            <div class="nav-item" data-tab="profile-tab">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
                <span>Profil</span></div>
            <div class="nav-item active" data-tab="timer-tab">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><polyline points="12 6 12 12 16 14"></polyline></svg>
                <span>Sayaç</span></div>
            <div class="nav-item" data-tab="analytics-tab">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="18" y="3" width="4" height="18"></rect><rect x="10" y="8" width="4" height="13"></rect><rect x="2" y="13" width="4" height="8"></rect></svg>
                <span>Analiz</span></div>
        </nav>
    </div>
    <script src="app.js"></script>
</body>

</html>
