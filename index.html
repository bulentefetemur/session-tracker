  OneSignalDeferred.push(async function(OneSignal) {

<title>Session Tracker</title>
<style>
    /* Temel Değişkenler ve Sıfırlama */
    :root {
        --bg-color: #000000;
        --text-primary: #FFFFFF;
        --text-secondary: #EBEBF599;
        --glass-bg: rgba(44, 44, 46, 0.7);
        --glass-border: rgba(255, 255, 255, 0.1);
        --dynamic-color: #FF3B30;
    }

    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        -webkit-tap-highlight-color: transparent;
    }

    body {
        background-color: var(--bg-color);
        color: var(--text-primary);
        overflow: hidden;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
    }

    #app {
        width: 100%;
        max-width: 430px;
        height: 100%;
        position: relative;
        display: flex;
        flex-direction: column;
    }

    /* Ekran Geçişleri */
    .screen {
        position: absolute;
        inset: 0;
        display: flex;
        flex-direction: column;
        padding: env(safe-area-inset-top) 24px env(safe-area-inset-bottom) 24px;
        opacity: 0;
        pointer-events: none;
        transition: opacity 0.4s cubic-bezier(0.25, 0.8, 0.25, 1);
    }

    .screen.active {
        opacity: 1;
        pointer-events: all;
        z-index: 10;
    }

    .screen.hidden {
        z-index: 1;
    }

    /* KURULUM EKRANI (Setup) */
    #setup-screen {
        justify-content: center;
        align-items: center;
        gap: 40px;
    }

    .header {
        text-align: center;
    }

    .header h1 {
        font-size: 34px;
        font-weight: 700;
        letter-spacing: 0.37px;
    }

    .subtitle {
        color: var(--text-secondary);
        font-size: 17px;
        margin-top: 8px;
    }

    .time-picker-container {
        position: relative;
        display: flex;
        align-items: center;
        gap: 16px;
        background: #1C1C1E;
        padding: 16px 20px;
        border-radius: 24px;
        -webkit-mask-image: linear-gradient(to bottom, transparent 5%, black 40%, black 60%, transparent 95%);
        mask-image: linear-gradient(to bottom, transparent 5%, black 40%, black 60%, transparent 95%);
    }

    .picker-group {
        display: flex;
        align-items: center;
        gap: 8px;
        z-index: 2;
    }

    .picker-column {
        height: 150px;
        width: 60px;
        overflow-y: scroll;
        scroll-snap-type: y mandatory;
        scrollbar-width: none;
        -ms-overflow-style: none;
    }

    .picker-column::-webkit-scrollbar {
        display: none;
    }

    .picker-column::before,
    .picker-column::after {
        content: '';
        display: block;
        height: 50px;
    }

    .picker-item {
        height: 50px;
        display: flex;
        align-items: center;
        justify-content: center;
        color: var(--text-primary);
        font-size: 42px;
        font-weight: 600;
        scroll-snap-align: center;
        font-variant-numeric: tabular-nums;
    }

    .picker-group label {
        color: var(--text-secondary);
        font-size: 15px;
        font-weight: 500;
    }

    .picker-highlight {
        position: absolute;
        top: 50%;
        left: 16px;
        right: 16px;
        height: 50px;
        transform: translateY(-50%);
        background: rgba(255, 255, 255, 0.05);
        border-radius: 12px;
        pointer-events: none;
        z-index: 1;
    }

    .picker-separator {
        font-size: 48px;
        font-weight: 600;
        color: var(--text-secondary);
        z-index: 2;
    }

    /* BUTONLAR (Capsule Form) */
    .capsule {
        border-radius: 9999px;
        border: none;
        font-size: 17px;
        font-weight: 600;
        padding: 18px 32px;
        width: 100%;
        cursor: pointer;
        transition: transform 0.2s ease, opacity 0.2s ease, background-color 0.3s ease;
    }

    .capsule:active {
        transform: scale(0.96);
        opacity: 0.8;
    }

    .btn-primary {
        background-color: #FF9500;
        /* Altın rengi / Orange-dark detay */
        color: #FFF;
    }

    .btn-toggle {
        background-color: var(--dynamic-color);
        color: #000;
    }

    .controls {
        display: flex;
        flex-direction: column;
        gap: 16px;
        width: 100%;
        margin-bottom: 140px;
    }

    .btn-secondary {
        background-color: #2C2C2E;
        color: #FFFFFF;
    }

    /* AKTİF EKRAN (Timer & Stats) */
    #active-screen {
        justify-content: space-between;
    }

    .active-header {
        text-align: center;
        padding-top: 20px;
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 12px;
    }

    .target-label {
        background: #1C1C1E;
        padding: 8px 16px;
        border-radius: 20px;
        font-size: 15px;
        font-weight: 500;
        color: var(--text-secondary);
    }

    .center-focus {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 16px;
        flex-grow: 1;
        justify-content: center;
    }

    .progress-pill {
        background: var(--dynamic-color);
        color: #000;
        padding: 6px 16px;
        border-radius: 16px;
        font-weight: 700;
        font-size: 17px;
        transition: background-color 0.3s ease;
    }

    .massive-timer {
        font-size: 80px;
        font-weight: 200;
        letter-spacing: -2px;
        font-variant-numeric: tabular-nums;
    }

    .state-text {
        font-size: 20px;
        font-weight: 500;
        color: var(--dynamic-color);
        transition: color 0.3s ease;
    }

    /* ALT KALICI İSTATİSTİKLER */
    .glass-footer {
        position: absolute;
        bottom: env(safe-area-inset-bottom, 20px);
        left: 20px;
        right: 20px;
        background: var(--glass-bg);
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
        border: 1px solid var(--glass-border);
        border-radius: 24px;
        padding: 20px;
        display: flex;
        justify-content: space-around;
        align-items: center;
    }

    .stat-box {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 4px;
        width: 45%;
    }

    .stat-title {
        font-size: 13px;
        color: var(--text-secondary);
        text-transform: uppercase;
        letter-spacing: 0.5px;
        font-weight: 600;
    }

    .stat-value {
        font-size: 22px;
        font-weight: 600;
        font-variant-numeric: tabular-nums;
    }

    .stat-divider {
        width: 1px;
        height: 40px;
        background: var(--glass-border);
    }
</style>
</head>

<body>
    <div id="https-warning"
        style="display:none; background:#FF3B30; color:white; padding:16px; text-align:center; font-weight:600; position:absolute; top:0; left:0; width:100%; z-index:9999; padding-top: env(safe-area-inset-top);">
        HATA: Bildirimler için HTTPS gereklidir!
    </div>

    <!-- Sessiz Modu Delen Audio Hack -->
    <audio id="silent-unlock" loop
        src="data:audio/wav;base64,UklGRigAAABXQVZFZm10IBIAAAABAAEARKwAAIhYAQACABAAAABkYXRhAgAAAAEA"></audio>

    <div id="app" class="theme-dark">
        <!-- KURULUM EKRANI (Idle State) -->
        <section id="setup-screen" class="screen active">
            <div class="header">
                <h1>Hedef Belirle</h1>
                <p class="subtitle">Çalışma süreni planla</p>
            </div>

            <div class="time-picker-container">
                <div class="picker-highlight"></div>
                <div class="picker-group">
                    <div class="picker-column" id="picker-hours"></div>
                    <label>Saat</label>
                </div>
                <div class="picker-separator">:</div>
                <div class="picker-group">
                    <div class="picker-column" id="picker-minutes"></div>
                    <label>Dk</label>
                </div>
                <div class="picker-separator">:</div>
                <div class="picker-group">
                    <div class="picker-column" id="picker-seconds"></div>
                    <label>Sn</label>
                </div>
            </div>

            <button id="btn-start-session" class="btn-primary capsule">Oturumu Başlat</button>
        </section>

        <!-- AKTİF OTURUM EKRANI (Working / Resting State) -->
        <section id="active-screen" class="screen hidden">
            <div class="active-header">
                <span class="target-label">Hedef: <span id="lbl-target-time">00:00</span></span>
            </div>

            <div class="center-focus">
                <div id="progress-indicator" class="progress-pill">
                    <span id="lbl-percentage">%0</span>
                </div>
                <h2 id="lbl-current-timer" class="massive-timer">00:00</h2>
                <p id="lbl-current-state" class="state-text">Çalışıyor</p>
            </div>

            <div class="controls">
                <button id="btn-toggle-state" class="btn-toggle capsule">Mola Ver</button>
                <button id="btn-end-session" class="btn-secondary capsule">Çalışmayı Sonlandır</button>
            </div>

            <footer class="glass-footer">
                <div class="stat-box">
                    <span class="stat-title">Toplam Çalışma</span>
                    <span id="stat-work-time" class="stat-value">00:00</span>
                </div>
                <div class="stat-divider"></div>
                <div class="stat-box">
                    <span class="stat-title">Toplam Mola</span>
                    <span id="stat-rest-time" class="stat-value">00:00</span>
                </div>
            </footer>
        </section>
    </div>

    <script>
        class SessionTracker {
            constructor() {
                this.state = 'idle';
                this.targetMs = 0;
                this.totalWorkMs = 0;
                this.totalRestMs = 0;
                this.phaseStartTime = 0;
                this.targetReached = false;
                this.lastSaveTime = Date.now();
                this.notifiedWork60 = false;
                this.notifiedRest15 = false;
                this.notifiedRest60 = false;
            }

            startSession(targetHours, targetMinutes, targetSeconds) {
                this.targetMs = (targetHours * 3600000) + (targetMinutes * 60000) + (targetSeconds * 1000);
                this.state = 'working';
                this.phaseStartTime = Date.now();
                this.targetReached = false;
                this.notifiedWork60 = false;
                this.notifiedRest15 = false;
                this.notifiedRest60 = false;
                this.save();
            }

            save() {
                const data = {
                    state: this.state,
                    targetMs: this.targetMs,
                    totalWorkMs: this.totalWorkMs,
                    totalRestMs: this.totalRestMs,
                    phaseStartTime: this.phaseStartTime,
                    targetReached: this.targetReached
                };
                localStorage.setItem('sessionData', JSON.stringify(data));
            }

            load() {
                return false;
            }

            reset() {
                this.state = 'idle';
                this.targetMs = 0;
                this.totalWorkMs = 0;
                this.totalRestMs = 0;
                this.phaseStartTime = 0;
                this.targetReached = false;
                this.notifiedWork60 = false;
                this.notifiedRest15 = false;
                this.notifiedRest60 = false;
                localStorage.removeItem('sessionData');
            }

            toggleState() {
                if (this.state === 'idle') return;

                const now = Date.now();
                const elapsed = now - this.phaseStartTime;

                if (this.state === 'working') {
                    this.totalWorkMs += elapsed;
                    this.state = 'resting';
                } else if (this.state === 'resting') {
                    this.totalRestMs += elapsed;
                    this.state = 'working';
                }

                this.phaseStartTime = now;
                this.notifiedWork60 = false;
                this.notifiedRest15 = false;
                this.notifiedRest60 = false;
                this.save();
            }

            getCurrentStats() {
                const now = Date.now();
                let currentWork = this.totalWorkMs;
                let currentRest = this.totalRestMs;
                let currentPhaseElapsed = 0;

                if (this.state !== 'idle') {
                    currentPhaseElapsed = now - this.phaseStartTime;

                    if (this.state === 'working') {
                        currentWork += currentPhaseElapsed;
                    } else if (this.state === 'resting') {
                        currentRest += currentPhaseElapsed;
                    }
                }

                const progressPercentage = this.targetMs > 0 ? (currentWork / this.targetMs) * 100 : 0;

                let justReachedTarget = false;
                let triggerWork60 = false;
                let triggerRest15 = false;
                let triggerRest60 = false;

                if (this.state === 'working' && currentPhaseElapsed >= 3600000 && !this.notifiedWork60) {
                    this.notifiedWork60 = true;
                    triggerWork60 = true;
                } else if (this.state === 'resting') {
                    if (currentPhaseElapsed >= 3600000 && !this.notifiedRest60) {
                        this.notifiedRest60 = true;
                        triggerRest60 = true;
                    } else if (currentPhaseElapsed >= 900000 && !this.notifiedRest15) {
                        this.notifiedRest15 = true;
                        triggerRest15 = true;
                    }
                }

                if (progressPercentage >= 100 && !this.targetReached && this.targetMs > 0) {
                    this.targetReached = true;
                    justReachedTarget = true;
                    this.save();
                }

                let colorHex = '#FF3B30';
                if (progressPercentage > 70) {
                    colorHex = '#34C759';
                } else if (progressPercentage > 30) {
                    colorHex = '#FFCC00';
                }

                return {
                    state: this.state,
                    currentTimerMs: currentPhaseElapsed,
                    totalWorkMs: currentWork,
                    totalRestMs: currentRest,
                    progressPercentage: progressPercentage,
                    color: colorHex,
                    justReachedTarget: justReachedTarget,
                    triggerWork60: triggerWork60,
                    triggerRest15: triggerRest15,
                    triggerRest60: triggerRest60
                };
            }

            static formatTime(ms) {
                const totalSeconds = Math.floor(ms / 1000);
                const hours = Math.floor(totalSeconds / 3600);
                const minutes = Math.floor((totalSeconds % 3600) / 60);
                const seconds = totalSeconds % 60;

                if (hours > 0) {
                    return `${hours}:${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
                }
                return `${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            try {
                const tracker = new SessionTracker();
                let renderInterval;

                const setupScreen = document.getElementById('setup-screen');
                const activeScreen = document.getElementById('active-screen');

                const btnStart = document.getElementById('btn-start-session');
                const btnToggle = document.getElementById('btn-toggle-state');
                const btnEnd = document.getElementById('btn-end-session');

                const lblTargetTime = document.getElementById('lbl-target-time');
                const lblPercentage = document.getElementById('lbl-percentage');
                const lblCurrentTimer = document.getElementById('lbl-current-timer');
                const lblCurrentState = document.getElementById('lbl-current-state');

                const statWorkTime = document.getElementById('stat-work-time');
                const statRestTime = document.getElementById('stat-rest-time');

                const root = document.documentElement;

                let audioCtx = null;
                let wakeLock = null;
                let unlockedOsc = null;
                let unlockedGain = null;

                const requestWakeLock = async () => {
                    try {
                        if ('wakeLock' in navigator) {
                            wakeLock = await navigator.wakeLock.request('screen');
                        }
                    } catch (err) {
                        console.warn(`Wake Lock API Hatası: ${err.message}`);
                    }
                };

                document.addEventListener('visibilitychange', async () => {
                    if (wakeLock !== null && document.visibilityState === 'visible') {
                        requestWakeLock();
                    }
                });

                const releaseWakeLock = async () => {
                    if (wakeLock !== null) {
                        await wakeLock.release();
                        wakeLock = null;
                    }
                };

                function switchToActiveScreen() {
                    setupScreen.classList.remove('active');
                    setupScreen.classList.add('hidden');
                    activeScreen.classList.remove('hidden');
                    activeScreen.classList.add('active');
                }

                const hoursColumn = document.getElementById('picker-hours');
                const minutesColumn = document.getElementById('picker-minutes');
                const secondsColumn = document.getElementById('picker-seconds');
                const itemHeight = 50;

                function populateColumn(column, max) {
                    if (!column) return;
                    column.innerHTML = '';
                    for (let i = 0; i <= max; i++) {
                        const div = document.createElement('div');
                        div.className = 'picker-item';
                        div.textContent = i.toString().padStart(2, '0');
                        column.appendChild(div);
                    }
                }

                setTimeout(() => {
                    populateColumn(hoursColumn, 23);
                    populateColumn(minutesColumn, 59);
                    populateColumn(secondsColumn, 59);
                }, 100);

                function getSelectedValue(column) {
                    return Math.round(column.scrollTop / itemHeight);
                }

                function savePickerState() { }

                let scrollTimeout;
                function handleScroll() {
                    clearTimeout(scrollTimeout);
                    scrollTimeout = setTimeout(savePickerState, 150);
                }

                hoursColumn.addEventListener('scroll', handleScroll);
                minutesColumn.addEventListener('scroll', handleScroll);
                secondsColumn.addEventListener('scroll', handleScroll);

                btnStart.addEventListener('click', async () => {
                    try {
                        // 1. BİLDİRİM İZNİ (En tepede ve doğrudan senkron)
                        if (window.OneSignal && window.OneSignal.Notifications) {
                            window.OneSignal.Notifications.requestPermission();
                        } else {
                            window.OneSignalDeferred = window.OneSignalDeferred || [];
                            window.OneSignalDeferred.push(function(OneSignal) {
                                OneSignal.Notifications.requestPermission();
                            });
                        }

                        // 2. Audio Unlock Hack (Sessiz Modu Delme)
                        let silentAudio = document.getElementById('silent-unlock');
                        if (silentAudio) {
                            silentAudio.play().then(() => {
                                silentAudio.pause();
                                silentAudio.currentTime = 0;
                            }).catch(e => console.warn("Sessiz ses çalınamadı:", e));
                        }

                        // 3. Hedef Süre Validasyonu
                        const hours = getSelectedValue(hoursColumn);
                        const minutes = getSelectedValue(minutesColumn);
                        const seconds = getSelectedValue(secondsColumn);

                        if (hours === 0 && minutes === 0 && seconds === 0) {
                            alert('Lütfen geçerli bir hedef süre belirleyin.');
                            return;
                        }

                        // 4. AudioContext Başlatma
                        if (!audioCtx) {
                            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                        }
                        if (audioCtx.state === 'suspended') {
                            audioCtx.resume();
                        }

                        if (!unlockedOsc && audioCtx) {
                            unlockedGain = audioCtx.createGain();
                            unlockedGain.gain.value = 0;
                            unlockedOsc = audioCtx.createOscillator();
                            unlockedOsc.type = 'sine';
                            unlockedOsc.connect(unlockedGain);
                            unlockedGain.connect(audioCtx.destination);
                            unlockedOsc.start();
                        }

                        // 5. Kronometreyi Başlat
                        tracker.startSession(hours, minutes, seconds);

                        lblTargetTime.textContent = `${hours > 0 ? hours + 'sa ' : ''}${minutes}dk ${seconds}sn`;
                        switchToActiveScreen();
                        requestWakeLock();
                        renderInterval = setInterval(updateUI, 100);
                    } catch (e) {
                        alert("Start Error: " + e.message);
                    }
                });

                btnToggle.addEventListener('click', () => {
                    try {
                        tracker.toggleState();

                        if (tracker.state === 'working') {
                            btnToggle.textContent = 'Mola Ver';
                            lblCurrentState.textContent = 'Çalışıyor';
                            lblCurrentState.style.color = 'var(--dynamic-color)';
                        } else if (tracker.state === 'resting') {
                            btnToggle.textContent = 'Çalışmaya Dön';
                            lblCurrentState.textContent = 'Mola Veriliyor';
                            lblCurrentState.style.color = '#0A84FF';
                        }
                    } catch (e) {
                        alert("Toggle Error: " + e.message);
                    }
                });

                function handleSessionReset() {
                    if (confirm("Mevcut oturumu bitirmek istediğinize emin misiniz?")) {
                        tracker.reset();
                        clearInterval(renderInterval);
                        releaseWakeLock();
                        activeScreen.classList.remove('active');
                        activeScreen.classList.add('hidden');
                        setupScreen.classList.remove('hidden');
                        setupScreen.classList.add('active');
                    }
                }

                btnEnd.addEventListener('click', handleSessionReset);

                async function fireNotification(title, body) {
                    try {
                        const reg = await navigator.serviceWorker.ready;
                        await reg.showNotification(title, {
                            body: body,
                            icon: "./icon-192.png",
                            badge: "./icon-192.png",
                            vibrate: [200, 100, 200]
                        });
                        
                        // OneSignal API üzerinden Serverless push gönderim hazırlığı:
                        // if (window.OneSignal) {
                        //     // API Call proxy'ye yönlendirilecek
                        // }
                    } catch (e) {
                        console.error("Bildirim hatası:", e);
                    }
                }

                function updateUI() {
                    try {
                        const stats = tracker.getCurrentStats();

                        root.style.setProperty('--dynamic-color', stats.color);
                        lblCurrentTimer.textContent = SessionTracker.formatTime(stats.currentTimerMs);
                        lblPercentage.textContent = `%${Math.floor(stats.progressPercentage)}`;
                        statWorkTime.textContent = SessionTracker.formatTime(stats.totalWorkMs);
                        statRestTime.textContent = SessionTracker.formatTime(stats.totalRestMs);

                        if (stats.justReachedTarget) {
                            fireNotification("Hedefe Ulaşıldı! 🎉", "Belirlediğiniz çalışma süresini tamamladınız. Harika iş çıkardınız!");
                        }
                        if (stats.triggerWork60) {
                            fireNotification("Ara Uyarı ☕", "Yaklaşık 1 saattir çalışıyorsun. Mola vermeye ne dersin?");
                        }
                        if (stats.triggerRest15) {
                            fireNotification("Mola Bitti 💪", "Yeter bu kadar mola. Hadi işinin başına!");
                        }
                        if (stats.triggerRest60) {
                            fireNotification("Uzun Mola 🍱", "Sanırım yemek molası verdin. Ama artık işe dönme zamanı!");
                        }

                        const currentTime = Date.now();
                        if (currentTime - tracker.lastSaveTime >= 1000) {
                            tracker.save();
                            tracker.lastSaveTime = currentTime;
                        }
                    } catch (e) {
                        console.error("UI Update Error:", e);
                    }
                }

            } catch (e) {
                alert("Kritik Hata: " + e.message);
                console.error(e);
            }
        });

        // --- SERVICE WORKER KAYDI (Otomatik Güncelleme & PWA Desteği) ---
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', async () => {
                try {
                    const reg = await navigator.serviceWorker.register('./sw.js', { scope: './' });
                    console.log('Service Worker başarıyla kaydedildi. Kapsam:', reg.scope);

                    reg.addEventListener('updatefound', () => {
                        const newWorker = reg.installing;
                        newWorker.addEventListener('statechange', () => {
                            if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
                                console.log('Yeni sürüm bulundu, sayfa otomatik yenileniyor...');
                            }
                        });
                    });
                } catch (err) {
                    console.warn('Service Worker kaydı başarısız:', err);
                }
            });

            let refreshing = false;
            navigator.serviceWorker.addEventListener('controllerchange', () => {
                if (!refreshing) {
                    window.location.reload();
                    refreshing = true;
                }
            });
        }
    </script>
